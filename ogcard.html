<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OG Card Preview</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #18181b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
    }

    .card {
      width: 1200px;
      height: 630px;
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 64px 72px;
    }

    /* Subtle grid background */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    /* Glow accent top-right */
    .card::after {
      content: '';
      position: absolute;
      top: -120px;
      right: -120px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(250,250,250,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    .monogram {
      width: 52px;
      height: 52px;
      background: #09090b;
      border: 1px solid #3f3f46;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      font-weight: 500;
      color: #fafafa;
      letter-spacing: 0.5px;
    }

    .badge {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #71717a;
      letter-spacing: 0.08em;
      border: 1px solid #27272a;
      padding: 6px 14px;
      border-radius: 999px;
    }

    .middle {
      position: relative;
      z-index: 1;
    }

    .name {
      font-size: 72px;
      font-weight: 600;
      color: #fafafa;
      letter-spacing: -2.5px;
      line-height: 1;
      margin-bottom: 20px;
    }

    .name span {
      color: #3f3f46;
    }

    .tagline {
      font-size: 22px;
      font-weight: 300;
      color: #71717a;
      letter-spacing: -0.3px;
      max-width: 520px;
      line-height: 1.5;
    }

    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    .tags {
      display: flex;
      gap: 8px;
    }

    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #52525b;
      border: 1px solid #27272a;
      padding: 5px 12px;
      border-radius: 6px;
      letter-spacing: 0.04em;
    }

    .url {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: #3f3f46;
      letter-spacing: 0.04em;
    }

    /* Decorative corner lines */
    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      z-index: 2;
    }
    .corner-tl { top: 20px; left: 20px; border-top: 1px solid #3f3f46; border-left: 1px solid #3f3f46; }
    .corner-tr { top: 20px; right: 20px; border-top: 1px solid #3f3f46; border-right: 1px solid #3f3f46; }
    .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid #3f3f46; border-left: 1px solid #3f3f46; }
    .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid #3f3f46; border-right: 1px solid #3f3f46; }
  </style>
</head>
<body>
  <div class="card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="top">
      <div class="monogram">dg</div>
      <div class="badge">software engineer</div>
    </div>

    <div class="middle">
      <div class="name">Building things<span>.</span></div>
      <div class="tagline">Just a software engineer coding things on linux.</div>
    </div>

    <div class="bottom">
      <div class="tags">
        <div class="tag">python</div>
        <div class="tag">golang</div>
        <div class="tag">c#</div>
        <div class="tag">typescript</div>
      </div>
      <div class="url">derrickgee.dev</div>
    </div>
  </div>
</body>
</html>
